# Compiler Explorer language config for Overt.
#
# Destination: compiler-explorer/compiler-explorer:etc/config/overt.defaults.properties
# Docs: https://github.com/compiler-explorer/compiler-explorer/blob/main/docs/AddingACompiler.md
#
# One block per installed compiler version. CE concatenates `compilers=` lists
# across properties files to build the dropdown.

compilers=&overt

group.overt.compilers=overt010preview:overttrunk
group.overt.groupName=Overt
group.overt.isSemVer=true

# --- v0.1.0-preview -----------------------------------------------------------
compiler.overt010preview.exe=/opt/compiler-explorer/overt-0.1.0-preview/bin/overt
compiler.overt010preview.name=Overt 0.1.0-preview
compiler.overt010preview.semver=0.1.0-preview

# --- trunk / nightly ----------------------------------------------------------
# Placeholder until a nightly build job exists. Drop this block from the final
# PR if the nightly isn't set up yet — CE won't start without its exe path
# resolving to something real on the farm.
compiler.overttrunk.exe=/opt/compiler-explorer/overt-trunk/bin/overt
compiler.overttrunk.name=Overt (trunk)
compiler.overttrunk.semver=trunk

# --- language-wide defaults ---------------------------------------------------
# Overt transpiles to C# source text, so at launch the "compiler output" pane
# shows that source rather than assembly. Set both asm/binary false until we
# wire up chaining to csc/dotnet for true asm output.
supportsBinary=false
supportsExecute=false
supportsAsm=false

# Default flags: emit C# on stdout, no ANSI colors.
compilerType=overt
options=--emit=csharp --no-color

# File extensions CE associates with this language.
extensions=.ov

# A thin wrapper class will be needed in lib/compilers/overt.ts upstream;
# defer until submission time.
